<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1A73E8"/>
  <!-- Subtle inner highlight -->
  <rect width="64" height="64" rx="14" fill="url(#shine)" opacity="0.15"/>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- R letter -->
  <text
    x="11"
    y="46"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="40"
    font-weight="800"
    fill="white"
    letter-spacing="-3"
  >RS</text>
  <!-- Blue dot accent bottom-right -->
  <circle cx="54" cy="52" r="4" fill="white" opacity="0.55"/>
</svg>